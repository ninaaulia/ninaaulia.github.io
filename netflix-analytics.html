<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Analytics with Power BI – Nina Aulia Azhary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    :root {
      --bg:    #FEF2F4;
      --pink:  #D96098;
      --navy:  #325288;
      --teal:  #24A19C;
      --mint:  #EDFFF0;
      --muted: #E7CCCC;
      --white: #ffffff;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 { font-family: 'DM Serif Display', serif; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(254,242,244,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--muted);
      padding: .85rem 0;
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 900px; margin: 0 auto; padding: 0 1.5rem;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; color: var(--pink); text-decoration: none;
    }
    .nav-back {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .85rem; font-weight: 500; color: var(--navy);
      text-decoration: none; opacity: .75;
      transition: opacity .2s, color .2s;
    }
    .nav-back:hover { opacity: 1; color: var(--teal); }
    .nav-back svg { flex-shrink: 0; }

    /* PAGE CONTENT */
    .page { max-width: 900px; margin: 0 auto; padding: 3.5rem 1.5rem 5rem; }

    .page-eyebrow {
      font-size: .72rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--teal); margin-bottom: .6rem;
    }
    .page-title {
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      color: var(--navy); line-height: 1.2; margin-bottom: 1rem;
    }

    /* Tags row */
    .tag-row { display: flex; flex-wrap: wrap; gap: .45rem; margin-bottom: 2rem; }
    .tag {
      font-size: .72rem; font-weight: 600;
      padding: .2rem .7rem; border-radius: 99px;
      background: var(--mint); color: var(--teal); letter-spacing: .02em;
    }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--muted); margin: 2rem 0; }

    /* Embed wrapper — responsive Power BI iframe */
    .embed-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 62.25%; /* 373.5 / 600 */
      background: var(--white);
      border: 1px solid var(--muted);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .embed-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* Medium link */
    .external-link {
      display: inline-flex; align-items: center; gap: .45rem;
      margin-top: 1.6rem;
      padding: .6rem 1.3rem;
      border-radius: 8px;
      font-size: .875rem; font-weight: 500;
      background: transparent;
      color: var(--navy);
      border: 1.5px solid var(--muted);
      text-decoration: none;
      transition: border-color .2s, color .2s, transform .18s;
    }
    .external-link:hover {
      border-color: var(--teal); color: var(--teal); transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .page { padding: 2rem 1rem 4rem; }
    }
  </style>
</head>

<nav>

      Back

</nav>

    Read the article on Medium

</main>

</body>
</html>
